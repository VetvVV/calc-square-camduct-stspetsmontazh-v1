*{box-sizing:border-box} body{margin:0;background:#ececec;font-family:Arial,sans-serif;color:#111}.module-card{width:min(760px,calc(100vw - 32px));margin:34px auto;padding:28px;border-radius:12px;background:#fff}.module-card h1{margin:0 0 20px;font-size:28px}.module-layout{display:grid;grid-template-columns:minmax(280px,1fr) 260px;gap:22px;align-items:start}.preview-panel{position:relative;min-height:260px;border:1px solid #ddd;border-radius:8px;background:#fafafa;display:grid;place-items:center;overflow:hidden}.preview{width:100%;height:250px}.live-label{position:absolute;font-weight:700;font-style:italic;color:#1455ff}.live-label-1{right:42px;top:92px;color:#1455ff;writing-mode:vertical-rl}.live-label-2{left:118px;bottom:58px;color:#d00}.live-label-3{left:45px;bottom:76px;color:#008a22}.live-label-4{right:78px;bottom:70px;color:#1455ff}.live-label-5{left:168px;bottom:30px;color:#008a22}.form-panel{border:1px solid #d6cdb7;background:#f6f0df;border-radius:8px;padding:16px}.form-panel label{display:block;margin-bottom:14px;font-size:15px}.form-panel input,.form-panel select{display:block;width:100%;height:38px;margin-top:6px;padding:6px 10px;border:1px solid #888;background:#fff;font-size:16px}.result-panel{margin-top:22px;padding:18px;border-radius:8px;background:#f7f7f7}.result-panel div{margin-bottom:12px}.result-panel strong{display:block;font-size:18px}.result-panel button{margin-top:14px;padding:12px 22px;border:0;border-radius:8px;background:#d97706;color:#fff;font-weight:700;cursor:pointer}details{margin-top:12px;padding-top:12px;border-top:1px solid #ddd}details p{margin:8px 0}@media(max-width:720px){.module-card{margin:16px auto;padding:18px}.module-layout{grid-template-columns:1fr}.module-card h1{font-size:22px}}
