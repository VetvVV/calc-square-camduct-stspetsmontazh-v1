<script>

const std={

rect:[

100,
150,
200,
250,
300,
350,
400,
450,
500,
600,
700,
800,
900,
1000,
1120,
1250,
1400,
1500,
1600,
1800,
2000

],

round:[

80,
100,
125,
160,
180,
200,
224,
250,
280,
315,
355,
400,
450,
500,
560,
630,
710,
800,
900,
1000

]

};

let manualT=false;

let openLocks=false;
let openDetails=false;

function bind(id){

const input=
document.getElementById(
id
);

const menu=
input.nextElementSibling;

function draw(v=""){

menu.innerHTML="";

(

id==="holeA"

&&

document.getElementById(
"holeType"
)?.value==="round"

?

std.round

:

std.rect

)

.forEach(
v=>{

const d=
document.createElement(
"div"
);

d.className=
"item";

d.innerText=v;

d.onclick=()=>{

input.value=v;

menu.style.display=
"none";

if(
id==="holeA"
||
id==="holeB"
){

return;

}

calc();

};

menu.appendChild(
d
);

}
);

menu.style.display=
"block";

}

input.addEventListener(
"focus",
()=>{
input.select();
draw();
}
);

input.addEventListener(
"input",
()=>{
draw();
calc();
}
);

input.addEventListener("keydown",
e=>{

if(
e.key==="Enter"
)

menu.style.display=
"none";

}
);

document.addEventListener(
"click",
e=>{

if(
!input.parentNode.contains(
e.target
)
)

menu.style.display=
"none";

}
);

}

bind("A");
bind("B");
bind("L");

const materialOptions=[
"Оцинкована сталь",
"Нержавіюча сталь 430 технічна",
"Нержавіюча сталь 304 харчова"
];

const thicknessByMaterial={
"Оцинкована сталь":["0.5","0.7","0.9","1.0"],
"Нержавіюча сталь 430 технічна":["0.55","0.8","1.0"],
"Нержавіюча сталь 304 харчова":["0.55","0.8","1.0"]
};

material.innerHTML=
materialOptions
.map(
name=>`<option>${name}</option>`
)
.join("");

connection.innerHTML=
["З'єднання 1","З'єднання 2"]
.map(
name=>`<option>${name}</option>`
)
.join("");

const connectionTypeLabel=
document.createElement("label");

connectionTypeLabel.innerHTML=
`
<span id="connectionTypeTitle">Тип з'єднання 1</span>
<select id="connectionType">
<option>Шинорейка 20</option>
<option>Шинорейка 30</option>
<option>Рейка</option>
<option>ГК</option>
</select>
`;

const connectionLabel=
connection.parentElement;

const qtyLabel=
qty.closest("label");

if(qtyLabel){
qtyLabel.before(connectionLabel);
}

connectionLabel.after(
connectionTypeLabel
);

const connectionType=
document.getElementById("connectionType");

const connectionTypeTitle=
document.getElementById("connectionTypeTitle");

function updateConnectionTypeTitle(){

connectionTypeTitle.textContent=
`Тип ${connection.value}`;

}

updateConnectionTypeTitle();

function updateThicknessOptions(
shouldCalc=true
){

const previous=
t.value;

const options=
thicknessByMaterial[material.value] ||
thicknessByMaterial["Оцинкована сталь"];

t.innerHTML=
options
.map(
value=>`<option>${value}</option>`
)
.join("");

t.value=
options.includes(previous)
?
previous
:
options[0];

if(shouldCalc){
calc();
}

}

updateThicknessOptions(false);

t.addEventListener(
"change",
()=>{

manualT=true;

calc();

}
);

[
connection,
connectionType,
qty
]

.forEach(
x=>

x.addEventListener(
"change",
calc
)

);

connection.addEventListener(
"change",
updateConnectionTypeTitle
);

material.addEventListener(
"change",
()=>{

manualT=false;
updateThicknessOptions();

}
);

qty.addEventListener(
"input",
calc
);

function autoT(
A,
B
){

const m=
Math.max(
A,
B
);

if(
material.value.includes("Нержав")
){

if(
m>=1000
)
return "1.0";

if(
m>=500
)
return "0.8";

return "0.55";

}

if(
m>=1000
)
return "0.9";

if(
m>=500
)
return "0.7";

return "0.5";

}

function n(id){

return Number(
document.getElementById(
id
).value
)||0;

}

const guestLimitMax=5;

const calcControls=
document.getElementById("calcControls");

const btnCalculate=
document.getElementById("btnCalculate");

const guestLimitHint=
document.getElementById("guestLimitHint");

let currentProjectItem=null;

const signupModal=
document.getElementById("signupModal");

const signupClose=
document.getElementById("signupClose");

const signupLater=
document.getElementById("signupLater");

const signupSubmit=
document.getElementById("signupSubmit");

function showSignupModal(){

signupModal.classList.add("open");

}

function hideSignupModal(){

signupModal.classList.remove("open");

}

signupClose.addEventListener(
"click",
hideSignupModal
);

signupLater.addEventListener(
"click",
hideSignupModal
);

signupModal.addEventListener(
"click",
(e)=>{

if(
e.target===signupModal
){
hideSignupModal();
}

}
);

signupSubmit.addEventListener(
"click",
()=>{

if(
window.parent
&&
window.parent !== window
){
window.parent.postMessage(
{
type:"calcSquare:setRole",
role:"user"
},
"*"
);
}

hideSignupModal();

updateGuestControls(
guestState()
);

alert(
"Реєстрацію буде підключено наступним етапом. Зараз увімкнено режим користувача."
);

}
);

function appStorage(){

try{
return window.parent.localStorage;
}
catch(e){
return localStorage;
}

}

function todayKey(){

const d=
new Date();

return [
d.getFullYear(),
String(d.getMonth()+1).padStart(2,"0"),
String(d.getDate()).padStart(2,"0")
].join("-");

}

function currentRole(){

const allowedRoles=[
"guest",
"user",
"client",
"admin"
];

const fromUrl=
new URLSearchParams(
window.location.search
).get("role");

return allowedRoles.includes(
fromUrl
)
?
fromUrl
:
"guest";

}

function guestState(){

let state;

try{
state=JSON.parse(
appStorage().getItem("calcSquareGuestLimit") || "{}"
);
}
catch(e){
state={};
}

if(
state.date !== todayKey()
){

state={
date:todayKey(),
count:0,
signatures:[]
};

}

if(
!Array.isArray(state.signatures)
){
state.signatures=[];
}

return state;

}

function saveGuestState(state){

appStorage().setItem(
"calcSquareGuestLimit",
JSON.stringify(state)
);

}

function updateGuestControls(state){

const isGuest=
currentRole()==="guest";

calcControls.style.display=
isGuest
?
"flex"
:
"none";

if(
isGuest
){

const left=
Math.max(
0,
guestLimitMax-state.count
);

guestLimitHint.textContent=
left>0
?
`Доступно розрахунків сьогодні: ${left} з ${guestLimitMax}`
:
"Ліміт на сьогодні вичерпано";

}

}

function renderGuestPrompt(state){

updateGuestControls(state);

out.innerHTML=
`
<div class="guest-limit-card">
<strong>Гостьовий режим</strong>
Натисніть "Розрахувати", щоб виконати розрахунок. Для гостей доступно ${guestLimitMax} розрахунків на добу.
<br><br>
Щоб прибрати обмеження, зареєструйтесь і перейдіть у режим користувача.
</div>
`;

}

function renderGuestLimitReached(state){

updateGuestControls(state);

showSignupModal();

}

function allowGuestCalculation(
signature,
force
){

if(
currentRole()!=="guest"
){

updateGuestControls(
guestState()
);

return true;

}

const state=
guestState();

if(
state.signatures.includes(
signature
)
){

updateGuestControls(state);

return true;

}

if(
!force
){

renderGuestPrompt(state);

return false;

}

if(
state.count >= guestLimitMax
){

renderGuestLimitReached(state);

return false;

}

state.count++;

state.signatures.push(
signature
);

saveGuestState(state);

updateGuestControls(state);

if(
state.count >= guestLimitMax
){

setTimeout(
showSignupModal,
0
);

}

return true;

}

function lockText(
z1,
z2,
name
){

if(
name==="Зварювання"
)

return `15/0 "Зварювання"`;

return `${z1}/${z2} "Американський замок"`;

}

function addCurrentToProject(){

if(
!currentProjectItem
){
return;
}

if(
window.parent &&
window.parent !== window
){

window.parent.postMessage(
{
type:"calcSquare:addProjectItem",
item:currentProjectItem
},
"*"
);

}
else{

alert(
"Відкрийте калькулятор із головної сторінки, щоб додати виріб у проект."
);

}

}

function calc(
forceGuestCalculation=false
){

const holeOpened=
document.querySelector(
'details:nth-of-type(2)'
)?.open;

const A=n("A");

const B=n("B");

const L=n("L");

if(
!manualT
)

t.value=
autoT(
A,
B,

);

const T=
+t.value;

const Q=
+qty.value;

let Z1;
let Z2;
let lockName;

if(
L<=200
){

Z1=15;

Z2=0;

lockName="Зварювання";

}else{

Z1=
T<0.9
?
6
:
5;

Z2=
T<0.9
?
30
:
28;

lockName="Американський замок";

}

const P=
2*(A+B);

const clean=
P
*
L
*
Q
/
1000000;


const holeType=
document.getElementById(
"holeType"
)?.value
||
"none";

const holeA=
+(
document.getElementById(
"holeA"
)?.value
||
0
);

const holeB=
+(
document.getElementById(
"holeB"
)?.value
||
0
);

const holeQ=
+(
document.getElementById(
"holeQ"
)?.value
||
1
);

const calculationSignature=
[
A,
B,
L,
T,
Q,
material.value,
connection.value,
connectionType.value,
holeType,
holeA,
holeB,
holeQ
].join("|");

if(
!allowGuestCalculation(
calculationSignature,
forceGuestCalculation
)
){
return;
}

let holeArea=0;

if(
holeType==="round"
){

holeArea=

Math.PI

*

(
holeA
/
2
)

**

2

*

holeQ

/

1000000;

}

if(
holeType==="rect"
){

holeArea=

holeA

*

holeB

*

holeQ

/

1000000;

}

const cleanFinal=

Math.max(
0,
clean-
holeArea
);

let layout=
"ABAB";

let parts=1;

let rus=0;

const unfold=
P+
Z1+
Z2;

const sheetW=
+(
document.getElementById("sheetW")
?.value
||
1245
);

const sheetL=
+(
document.getElementById("sheetL")
?.value
||
2960
);

const fitABAB=
(
(P<=sheetW && L<=sheetL)
||
(P<=sheetL && L<=sheetW)
);

const fitABA=
(
(A+B+A<=sheetW && L<=sheetL)
||
(A+B+A<=sheetL && L<=sheetW)
);

const fitAB=
(
(A+B<=sheetW && L<=sheetL)
||
(A+B<=sheetL && L<=sheetW)
);

if(
fitABAB
){

parts=1;

layout="ABAB";

}
else if(
fitABA
&&
L<=sheetL
){

parts=2;

layout="ABA + B";

}
else if(
fitAB
&&
L<=sheetL
){

parts=2;

layout="AB + AB";

}
else{

parts=4;

layout="A + B + A + B";

}

rus=0;

if(
parts===1
){

rus=0;

}

else if(
parts===2
){

if(L>sheetL){
rus=2;
}

}

else{

if(A>sheetW){
rus+=2;
}

if(B>sheetW){
rus+=2;
}

}

const mainCount=
parts;

const rusCount=
rus;

const mainArea=

mainCount

*

(
Z1+Z2
)

*

L

*

Q

/

1000000;

const rusArea=

rusCount

*

(
T<0.9
?
25
:
28
)

*
P

*
Q

/

1000000;

const full=

cleanFinal

+

mainArea

+

rusArea;

const rho=

material.value
.includes(
"Нержав"
)

?

8000

:

7850;

const mass=

full

*

T

/

1000

*

rho;

currentProjectItem={
name:"Повітропровід прямокутний",
size:`A ${A} × B ${B} × L ${L} мм; ${connection.value}; ${connectionType.value}`,
quantity:Q,
material:`${material.value}, t=${T} мм`,
area:full,
mass:mass
};

let layoutView=layout;

if(layout==="ABAB"){
layoutView="[ABAB]";
}

else if(layout==="ABA + B"){
layoutView="[ABA][B]";
}

else if(layout==="AB + AB"){
layoutView="[AB][AB]";
}

else{
layoutView="[A][B][A][B]";
}

if(rus>0){

if(layout==="ABAB"){
layoutView="[a│A│B│A│B]";
}

else if(layout==="ABA + B"){
layoutView="[a│A][B]";
}

else if(layout==="AB + AB"){
layoutView="[a│A][b│B]";
}

else{
layoutView="[a│A][b│B][a│A][b│B]";
}

}

out.innerHTML=

`

Чиста площа

<br>

<b>

${clean.toFixed(3)} м²

<br>

<details id="detailsBlock">

<summary
style="
cursor:pointer;
font-weight:600;
margin:6px 0;
