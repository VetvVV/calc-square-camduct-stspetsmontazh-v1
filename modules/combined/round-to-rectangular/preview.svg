<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#555"/></marker>
  </defs>

  <!-- тело перехода: круг сверху -> прямоугольник снизу -->
  <path d="M152,55 L122,195 L278,195 L248,55 Z" fill="#f4f4f4" stroke="#555" stroke-width="1.4"/>
  <!-- грани перехода -->
  <line x1="200" y1="55" x2="122" y2="195" stroke="#dcdcdc" stroke-width="1"/>
  <line x1="200" y1="55" x2="278" y2="195" stroke="#dcdcdc" stroke-width="1"/>
  <!-- прямоугольный низ: глубина (3D) -->
  <path d="M122,195 L150,178 L306,178 L278,195 Z" fill="#e6e6e6" stroke="#666" stroke-width="1.2"/>
  <line x1="278" y1="195" x2="306" y2="178" stroke="#666" stroke-width="1.2"/>
  <!-- круглый верх -->
  <ellipse cx="200" cy="55" rx="48" ry="15" fill="#eaeaea" stroke="#555" stroke-width="1.4"/>

  <!-- D (диаметр) сверху -->
  <line x1="152" y1="33" x2="248" y2="33" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="152" y1="44" x2="152" y2="35" stroke="#aaa" stroke-width="1"/>
  <line x1="248" y1="44" x2="248" y2="35" stroke="#aaa" stroke-width="1"/>

  <!-- A (ширина) снизу -->
  <line x1="122" y1="214" x2="278" y2="214" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="122" y1="197" x2="122" y2="212" stroke="#aaa" stroke-width="1"/>
  <line x1="278" y1="197" x2="278" y2="212" stroke="#aaa" stroke-width="1"/>

  <!-- L (длина) слева, вертикально -->
  <line x1="100" y1="55" x2="100" y2="195" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="102" y1="55" x2="148" y2="55" stroke="#aaa" stroke-width="1"/>
  <line x1="102" y1="195" x2="120" y2="195" stroke="#aaa" stroke-width="1"/>

  <!-- B (высота/глубина) справа по ребру -->
  <line x1="288" y1="197" x2="316" y2="180" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="278" y1="195" x2="288" y2="197" stroke="#aaa" stroke-width="1"/>
  <line x1="306" y1="178" x2="316" y2="180" stroke="#aaa" stroke-width="1"/>
</svg>
