<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Calc Square — ST Spetsmontazh</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.wrap{
max-width:760px;
margin:auto;
padding:24px;
}

.card{
background:white;
padding:20px;
border-radius:12px;


}

.layout{

display:grid;

grid-template-columns:

240px

240px

1fr;

gap:40px;

align-items:start;

}

.left,
.right{
display:flex;
flex-direction:column;
gap:18px;
}

.right{

display:flex;

flex-direction:column;

gap:20px;

padding-top:0px;

}

.field{
position:relative;
}

label{
font-size:14px;
display:block;
margin-bottom:8px;
}

input,
select{

width:140px;

padding:10px;

box-sizing:border-box;

font-size:16px;

}

#material{
min-width:180px;
padding:8px;
}

.dropdown{
position:absolute;
top:66px;
left:0;
width:140px;
background:white;
border:1px solid #ccc;
border-radius:8px;
display:none;

max-height:320px;

overflow-y:auto;

z-index:50;
}

.item{
padding:8px;
cursor:pointer;
}

.item:hover{
background:#efefef;
}

.preview{

display:flex;

justify-content:center;

align-items:center;

margin-top:-20px;

margin-left:-140px;

}

.preview img{

width:650px;

max-width:none;

height:auto;

object-fit:contain;

}

.result{
margin-top:20px;
padding:16px;
background:#f8f8f8;
border-radius:10px;
}

details{
margin-top:12px;
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:24px;

padding-bottom:12px;

border-bottom:1px solid #d7d7d7;
}

.back{
text-decoration:none;

color:#444;

font-weight:700;
}

.back:hover{
opacity:.7;
}

.brand{
font-size:18px;

font-weight:700;
}
display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:24px;

padding-bottom:12px;

border-bottom:1px solid #d7d7d7;

}

.back{

text-decoration:none;

color:#444;

font-weight:700;

}

.back:hover{

opacity:.7;

}

.brand{

font-size:18px;

font-weight:700;

}
}

</style>

</head>

<body>

  <div class="topbar">

<a href="../../index.html" class="back">
← Каталог
</a>

<div class="brand">
Calc Square
</div>

</div>

<div class="wrap">

<div class="card">

<h2>

Воздуховоды → Прямоугольный

</h2>

<div class="layout">

<div class="left">

<div class="field">

<label>A — Ширина</label>

<input
id="A"
value="150"
>

<div class="dropdown"></div>

</div>

<div class="field">

<label>B — Высота</label>

<input
id="B"
value="150"
>

<div class="dropdown"></div>

</div>

<div class="field">

<label>L — Длина</label>

<input
id="L"
value="300"
>

<div class="dropdown"></div>

</div>

</div>

<div class="preview">

<img
<img
src="./rectangular_duct.svg"
>

</div>

<div class="right">

<label>

Материал

<select id="material">

<option>
Оцинкованная сталь
</option>

<option>
Нержавеющая сталь
</option>

</select>

</label>

<label>

Толщина

<select id="t">

<option>0.5</option>
<option>0.7</option>
<option>0.9</option>

</select>

</label>

<label>

Количество

<input
id="qty"
value="1"
type="number"
min="1"
max="999"
>



</select>

</label>

</div>

</div>

<div
class="result"
id="out">

</div>

</div>

</div>

<script>

const std={

rect:[

100,
150,
200,
250,
300,
350,
400,
450,
500,
600,
700,
800,
900,
1000,
1120,
1250,
1400,
1500,
1600,
1800,
2000

],

round:[

80,
100,
125,
160,
180,
200,
224,
250,
280,
315,
355,
400,
450,
500,
560,
630,
710,
800,
900,
1000

]

};

let manualT=false;

let openLocks=false;
let openDetails=false;

function bind(id){

const input=
document.getElementById(
id
);

const menu=
input.nextElementSibling;

function draw(v=""){

menu.innerHTML="";

(

id==="holeA"

&&

document.getElementById(
"holeType"
)?.value==="round"

?

std.round

:

std.rect

)

.forEach(
v=>{

const d=
document.createElement(
"div"
);

d.className=
"item";

d.innerText=v;

d.onclick=()=>{

input.value=v;

menu.style.display=
"none";

if(
id==="holeA"
||
id==="holeB"
){

return;

}

calc();

};

menu.appendChild(
d
);

}
);

menu.style.display=
"block";

}

input.addEventListener(
"focus",
()=>{
input.select();
draw();
}
);

input.addEventListener(
"input",
()=>{
draw();
calc();
}
);

input.addEventListener("keydown",
e=>{

if(
e.key==="Enter"
)

menu.style.display=
"none";

}
);

document.addEventListener(
"click",
e=>{

if(
!input.parentNode.contains(
e.target
)
)

menu.style.display=
"none";

}
);

}

bind("A");
bind("B");
bind("L");

t.addEventListener(
"change",
()=>{

manualT=true;

calc();

}
);

[
material,
qty
]

.forEach(
x=>

x.addEventListener(
"change",
calc
)

);

qty.addEventListener(
"input",
calc
);

function autoT(
A,
B
){

const m=
Math.max(
A,
B
);

if(
m>=1000
)
return "0.9";

if(
m>=500
)
return "0.7";

return "0.5";

}

function n(id){

return Number(
document.getElementById(
id
).value
)||0;

}

function lockText(
z1,
z2,
name
){

if(
name==="Сварка"
)

return `15/0 "Сварка"`;

return `${z1}/${z2} "Американка"`;

}

function calc(){

const holeOpened=
document.querySelector(
'details:nth-of-type(2)'
)?.open;

const A=n("A");

const B=n("B");

const L=n("L");

if(
!manualT
)

t.value=
autoT(
A,
B,

);

const T=
+t.value;

const Q=
+qty.value;

let Z1;
let Z2;
let lockName;

if(
L<=200
){

Z1=15;

Z2=0;

lockName="Сварка";

}else{

Z1=
T<0.9
?
6
:
5;

Z2=
T<0.9
?
30
:
28;

lockName="Американка";

}

const P=
2*(A+B);

const clean=
P
*
L
*
Q
/
1000000;


const holeType=
document.getElementById(
"holeType"
)?.value
||
"none";

const holeA=
+(
document.getElementById(
"holeA"
)?.value
||
0
);

const holeB=
+(
document.getElementById(
"holeB"
)?.value
||
0
);

const holeQ=
+(
document.getElementById(
"holeQ"
)?.value
||
1
);

let holeArea=0;

if(
holeType==="round"
){

holeArea=

Math.PI

*

(
holeA
/
2
)

**

2

*

holeQ

/

1000000;

}

if(
holeType==="rect"
){

holeArea=

holeA

*

holeB

*

holeQ

/

1000000;

}

const cleanFinal=

Math.max(
0,
clean-
holeArea
);

let layout=
"ABAB";

let parts=1;

let rus=0;

const unfold=
P+
Z1+
Z2;

const sheetW=
+(
document.getElementById("sheetW")
?.value
||
1245
);

const sheetL=
+(
document.getElementById("sheetL")
?.value
||
2960
);

const fitABAB=
(
(P<=sheetW && L<=sheetL)
||
(P<=sheetL && L<=sheetW)
);

const fitABA=
(
(A+B+A<=sheetW && L<=sheetL)
||
(A+B+A<=sheetL && L<=sheetW)
);

const fitAB=
(
(A+B<=sheetW && L<=sheetL)
||
(A+B<=sheetL && L<=sheetW)
);

if(
fitABAB
){

parts=1;

layout="ABAB";

}
else if(
fitABA
&&
L<=sheetL
){

parts=2;

layout="ABA + B";

}
else if(
fitAB
&&
L<=sheetL
){

parts=2;

layout="AB + AB";

}
else{

parts=4;

layout="A + B + A + B";

}

rus=0;

if(
parts===1
){

rus=0;

}

else if(
parts===2
){

if(L>sheetL){
rus=2;
}

}

else{

if(A>sheetW){
rus+=2;
}

if(B>sheetW){
rus+=2;
}

}

const mainCount=
parts;

const rusCount=
rus;

const mainArea=

mainCount

*

(
Z1+Z2
)

*

L

*

Q

/

1000000;

const rusArea=

rusCount

*

(
T<0.9
?
25
:
28
)

*
P

*
Q

/

1000000;

const full=

cleanFinal

+

mainArea

+

rusArea;

const rho=

material.value
===
"Нержавеющая сталь"

?

8000

:

7850;

const mass=

full

*

T

/

1000

*

rho;

let layoutView=layout;

if(layout==="ABAB"){
layoutView="[ABAB]";
}

else if(layout==="ABA + B"){
layoutView="[ABA][B]";
}

else if(layout==="AB + AB"){
layoutView="[AB][AB]";
}

else{
layoutView="[A][B][A][B]";
}

if(rus>0){

if(layout==="ABAB"){
layoutView="[a│A│B│A│B]";
}

else if(layout==="ABA + B"){
layoutView="[a│A][B]";
}

else if(layout==="AB + AB"){
layoutView="[a│A][b│B]";
}

else{
layoutView="[a│A][b│B][a│A][b│B]";
}

}

out.innerHTML=

`

Чистовая площадь

<br>

<b>

${clean.toFixed(3)} м²

<br>

<details id="detailsBlock">

<summary
style="
cursor:pointer;
font-weight:600;
margin:6px 0;
"
>

Расчёт

</summary>

<small>

Формула:

<br>

Sч = 2 × (A + B) × L × Q

<br><br>

где:

<br>
Sч — чистовая площадь
<br>
A — ширина

<br>

B — высота

<br>

L — длина

<br>
Q — количество изделий
<br>


<br>

<br><br>

Подстановка:

<br>

2 × (${A} + ${B}) × ${L} × ${Q}

<br>

= ${(2*(A+B)*L*Q).toLocaleString('ru-RU')} мм²

<br>

÷ 1 000 000

<br>

= ${clean.toFixed(3)} м²
</small>

</b>

<br><br>
</small>








<br><br>

<hr
style="
border:none;
border-top:1px solid #ddd;
margin:12px 0;
"
>

<b>

Замки и раскладка

</b>

<br><br>
Лист заготовки

<div style="display:flex;flex-direction:column;gap:8px">

<div>
<label style="display:inline-block;width:90px">
Ширина:
</label>

<input
id="sheetW"
value="${sheetW}"
style="width:80px"
onchange="calc()"
>

мм
</div>

<div>
<label style="display:inline-block;width:90px">
Длина:
</label>

<input
id="sheetL"
value="${sheetL}"
style="width:80px"
onchange="calc()"
>

мм
</div>

</div>

<br>

<br><br>
Схема:

<span
style="
display:inline-block;
padding:6px 12px;
background:#ececec;
border-radius:8px;
font-family:monospace;
font-size:16px;
"
>

${layoutView}

</span>

<br>

Частей:

${parts}

<br><br>

Основное соединение:

${mainCount}

×

${lockText(
Z1,
Z2,
lockName
)}

<br>

Площадь:

${mainArea.toFixed(3)}
м²

<br><br>

Дополнительные соединения:

${rusCount}

${
rusCount
?

` × ${
T<0.9
?
"12.5/12.5"
:
"14/14"
}
"Русский"`

:
""
}

<br>

Площадь:

${rusArea.toFixed(3)}
м²

<br><br>

Площадь замков отдельно:

${(
mainArea+
rusArea
).toFixed(3)}

м²

<br><br>
</details>

<br><br>

<br><br>

<details
id="holes"
ontoggle="
openHole=this.open
"
>

<summary>

Отверстия

${
holeType!=="none"

?

` • `

+

(
holeType==="round"

?

`Круглое D${holeA}`

:

`Прямоугольное ${holeA}×${holeB}`

)

+

` ×${holeQ}`

+

` • ${holeArea.toFixed(3)} м²`

:

""

}

</summary>

<br>

Тип

<select
id="holeType"
onchange="
toggleHole();
"
style="width:140px"
>

<option value="none">

Выбрать

</option>

<option value="round">

Круглое

</option>

<option value="rect">

Прямоугольное

</option>

</select>

<br><br>

<div
id="holeBox"
style="display:none"
>

<label id="holeALabel">

Размер A

</label>

<br>

<div
style="
position:relative;
display:inline-block;
"
>

<input
id="holeA"
autocomplete="off"
value="${holeA}"
style="width:80px"
onclick="this.select()"
onchange="calc()"
>

<div
class="dropdown"
style="
top:100%;
left:0;
"
></div>

</div>

<span>мм</span>

<br><br>

<div id="holeBbox">

<label>

Размер B

</label>

<br>

<div
style="
position:relative;
display:inline-block;
"
>

<input
id="holeB"
autocomplete="off"
value="${holeB}"
style="width:80px"
onclick="this.select()"
onchange="calc()"
>

<div
class="dropdown"
style="
top:100%;
left:0;
"
></div>

</div>

<span>мм</span>
</div>

<br><br>

Количество

<br>

<input
id="holeQ"
autocomplete="off"
value="${holeQ}"
style="width:80px"
onclick="this.select()"
onchange="calc()"

>

</div>

<button
onclick="
event.preventDefault();
calc();
"
style="
margin-top:8px;
padding:8px 14px;
cursor:pointer;
"
>

Пересчитать отверстия

</button>

<br><br>

<div
id="holeAreaBox"
style="display:none"
>

<hr
style="
border:none;
border-top:1px solid #ddd;
margin:18px 0;
">

Площадь отверстий

<br>

<b>

${holeArea.toFixed(3)} м²

</b>

<br><br>

</div>
</details>

Полная площадь

<br>

<b>

${full.toFixed(3)} м²

</b>

<br>

<small>

Sч + Sзам = Sп

<br>

${clean.toFixed(3)}
+
${(
mainArea+
rusArea
).toFixed(3)}

=

${full.toFixed(3)}

м²

</small>

<br><br>

Масса изделия

<br>

<b>

${mass.toFixed(2)} кг

</b>

<br>

<small>

m = Sп × t × ρ

<br>

${full.toFixed(3)}
×

${T}

×

${rho}

÷ 1000

<br>

=

${mass.toFixed(2)}

кг

</small>

`;

if(
document.getElementById(
"holeA"
)
){
bind("holeA");
}

if(
document.getElementById(
"holeB"
)
){
bind("holeB");
}

const detailsBlock=
document.getElementById(
"detailsBlock"
);

if(detailsBlock){

detailsBlock.open=
openDetails;

detailsBlock.addEventListener(
"toggle",
()=>{

openDetails=
detailsBlock.open;

});

}

const d=
document.getElementById(
"locks"
);

if(d){

d.open=
openLocks;

d.addEventListener(
"toggle",
()=>{

openLocks=
d.open;

});

}

}

setTimeout(
()=>{

if(
holeOpened
){

const hole=
document.getElementById(
"holes"
);

if(
hole
){

hole.open=
true;

toggleHole();

}

}

},
0
);

function toggleHole(){

const type=
document.getElementById(
"holeType"
);

const box=
document.getElementById(
"holeBox"
);
const area=
document.getElementById(
"holeAreaBox"
);
const b=
document.getElementById(
"holeBbox"
);

const label=
document.getElementById(
"holeALabel"
);

if(
!type
||
!box
){
return;
}

box.style.display=
type.value==="none"
?
"none"
:
"block";
if(
area
){
area.style.display=
type.value==="none"
?
"none"
:
"block";
}
if(
label
){
label.innerText=
type.value==="round"
?
"Диаметр D"
:
"Размер A";
}
const a=
document.getElementById(
"holeA"
);

const bb=
document.getElementById(
"holeB"
);

if(
a
){

a.value="";

}

if(
bb
&&
type.value==="round"
){

bb.value="";

}
if(
b
){

b.style.display=

type.value==="rect"

?

"block"

:

"none";

}

}

calc();

</script>

</body>

</html>
