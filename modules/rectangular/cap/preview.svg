<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#555"/></marker>
  </defs>

  <!-- Заглушка как 3D-коробка: грань A×B спереди, борт C = глубина -->
  <polygon points="120,100 160,70 340,70 300,100" fill="#ededed" stroke="#666" stroke-width="1.4"/>
  <polygon points="300,100 340,70 340,162 300,192" fill="#e0e0e0" stroke="#666" stroke-width="1.4"/>
  <rect x="120" y="100" width="180" height="92" fill="#f6f6f6" stroke="#444" stroke-width="1.8"/>
  <line x1="120" y1="100" x2="300" y2="192" stroke="#cfcfcf" stroke-width="1"/>
  <line x1="300" y1="100" x2="120" y2="192" stroke="#cfcfcf" stroke-width="1"/>

  <!-- Размер A (ширина) — снизу, по переднему нижнему ребру -->
  <line x1="120" y1="208" x2="300" y2="208" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="120" y1="194" x2="120" y2="206" stroke="#aaa" stroke-width="1"/>
  <line x1="300" y1="194" x2="300" y2="206" stroke="#aaa" stroke-width="1"/>

  <!-- Размер B (высота) — слева -->
  <line x1="102" y1="100" x2="102" y2="192" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="106" y1="100" x2="118" y2="100" stroke="#aaa" stroke-width="1"/>
  <line x1="106" y1="192" x2="118" y2="192" stroke="#aaa" stroke-width="1"/>

  <!-- Размер C (борт) — снизу-справа, по переднему нижнему ребру глубины -->
  <line x1="307" y1="201" x2="347" y2="171" stroke="#555" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <line x1="300" y1="192" x2="307" y2="201" stroke="#aaa" stroke-width="1"/>
  <line x1="340" y1="162" x2="347" y2="171" stroke="#aaa" stroke-width="1"/>
</svg>
