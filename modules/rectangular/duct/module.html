<script>

function updatePreviewSvg(){

    const aInput = document.getElementById("A");
    const bInput = document.getElementById("B");
    const lInput = document.getElementById("L");

    const textA = document.getElementById("previewA");
    const textB = document.getElementById("previewB");
    const textC = document.getElementById("previewC");
    const svgTextA = document.getElementById("previewSvgA");
    const svgTextB = document.getElementById("previewSvgB");
    const svgTextC = document.getElementById("previewSvgC");

    if(!aInput || !bInput || !lInput || !textA || !textB || !textC){
        return;
    }

    const aText = "A = " + (aInput.value || 0);
    const bText = "B = " + (bInput.value || 0);
    const cText = "C = " + (lInput.value || 0);

    textA.textContent = aText;
    textB.textContent = bText;
    textC.textContent = cText;

    if(svgTextA) svgTextA.textContent = aText;
    if(svgTextB) svgTextB.textContent = bText;
    if(svgTextC) svgTextC.textContent = cText;
	
const body = document.getElementById("ductBody");
const dimALine = document.getElementById("dimALine");
const dimBLine = document.getElementById("dimBLine");

if(body && dimALine && dimBLine){

    const A = parseFloat(aInput.value) || 150;
    const B = parseFloat(bInput.value) || 150;

    const maxW = 360;
    const maxH = 180;

    const scale = Math.min(maxW / A, maxH / B);

    const w = A * scale;
    const h = B * scale;

    const x = 200 - w / 2;
    const y = 125 - h / 2;

    body.setAttribute("x", x);
    body.setAttribute("y", y);
    body.setAttribute("width", w);
    body.setAttribute("height", h);

    dimALine.setAttribute("x1", x);
    dimALine.setAttribute("x2", x + w);
    dimALine.setAttribute("y1", y + h + 20);
    dimALine.setAttribute("y2", y + h + 20);

    dimBLine.setAttribute("x1", x - 20);
    dimBLine.setAttribute("x2", x - 20);
    dimBLine.setAttribute("y1", y);
    dimBLine.setAttribute("y2", y + h);

    if(svgTextA){
    svgTextA.setAttribute("x", x + w / 2);
    svgTextA.setAttribute("y", y + h + 42);
    }

    if(svgTextB){
    svgTextB.setAttribute("x", x - 58);
    svgTextB.setAttribute("y", y + h / 2 + 5);
    }

    if(svgTextC){
    svgTextC.setAttribute("x", x + w / 2);
    svgTextC.setAttribute("y", y - 15);
    }
}
	
}

["A","B","L"].forEach(function(id){

    const input = document.getElementById(id);

    if(input){
        input.addEventListener("input", updatePreviewSvg);
        input.addEventListener("change", updatePreviewSvg);
    }

});

updatePreviewSvg();

function moduleLang(){
const params=new URLSearchParams(window.location.search);
const fromUrl=params.get("lang");

if(i18n[fromUrl]){
return fromUrl;
}

try{
const fromParent=window.parent.localStorage.getItem("calcSquareLang");

if(i18n[fromParent]){
return fromParent;
}
}
catch(e){}

const saved=localStorage.getItem("calcSquareLang") || "uk";

return i18n[saved] ? saved : "uk";
}

function setModuleLang(lang){
try{
appStorage().setItem("calcSquareLang",lang);
}
catch(e){
localStorage.setItem("calcSquareLang",lang);
}
}

function tr(key,replacements={}){
let value=(i18n[moduleLang()] && i18n[moduleLang()][key]) || i18n.uk[key] || key;

Object.entries(replacements).forEach(
([name,replacement])=>{
value=value.replaceAll(`{${name}}`,replacement);
}
);

return value;
}

function formatNumber(value){
return value.toLocaleString(moduleLang()==="ru" ? "ru-RU" : moduleLang()==="en" ? "en-US" : "uk-UA");
}

function allowGuestCalculation(
signature,
force
){

if(
!hasDailyCalculationLimit()
){

updateGuestControls(
guestState()
);

return true;

}

const state=
guestState();

if(
state.signatures.includes(
signature
)
){

updateGuestControls(state);

return true;

}

if(
!force
){

renderGuestPrompt(state);

return false;

}

if(
state.count >= guestLimitMax
){

renderGuestLimitReached(state);

return false;

}

state.count++;

state.signatures.push(
signature
);

saveGuestState(state);

updateGuestControls(state);

if(
state.count >= guestLimitMax
){

setTimeout(
showSignupModal,
0
);

}

return true;

}
