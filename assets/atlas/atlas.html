<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calc Square · Атлас</title>
<link rel="stylesheet" href="../fonts/exo2.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#e9e9e9;color:#24272d;font-family:"Exo 2",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;font-style:italic;padding:18px 12px}
.wrap{width:100%;max-width:none;margin:0 auto;container-type:inline-size}
.head{display:block;text-align:center;margin-bottom:18px}
h1{margin:0;color:#5b6573;font-size:30px;line-height:1;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.03em}
.intro{width:min(760px,calc(100% - 24px));margin:14px auto 6px;padding:12px 18px;border:1px solid rgba(223,122,18,.18);border-radius:14px;background:rgba(255,255,255,.62);color:#5b6573;font-size:14px;line-height:1.45;font-weight:700;text-align:center}
.version{position:fixed;right:14px;bottom:10px;z-index:40;color:#9aa1ab;font-size:11px;font-weight:700}
.cats{display:flex;flex-direction:column;gap:0}
details{background:transparent;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.5);margin-bottom:0}
details+details{margin-top:-1px}
summary{cursor:pointer;list-style:none;padding:24px 18px 6px;background:transparent;font-weight:800;color:#df7a12;text-align:center;font-size:18px}
summary::-webkit-details-marker{display:none}
.grid{display:grid;grid-template-columns:repeat(var(--atlas-cols,8),minmax(0,1fr));gap:20px 24px;padding:16px 32px 26px;background:transparent}
.card{position:relative;display:grid;min-width:0;text-align:center;color:inherit}
.card-main{display:grid;grid-template-rows:86px auto;gap:8px;width:100%;border:0;border-radius:0;background:transparent;padding:0;text-align:center;cursor:pointer;color:inherit;font:inherit}
.card:hover .card-main strong,.card-main:focus-visible strong{color:#df7a12}
.card-main img{width:100%;height:86px;object-fit:contain;filter:drop-shadow(0 2px 1px rgba(0,0,0,.08))}
.card-main strong{font-size:14px;line-height:1.15;font-weight:700;color:#3f4652}
.variants{position:fixed;z-index:10000;left:var(--variants-left,12px);top:var(--variants-top,12px);width:min(420px,calc(100vw - 24px));max-height:calc(100vh - 24px);overflow:auto;padding:14px;border:1px solid rgba(214,205,183,.95);border-radius:14px;background:rgba(255,255,255,.98);box-shadow:0 18px 44px rgba(0,0,0,.2);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(10px);transition:opacity .14s ease,transform .14s ease,visibility 0s linear .14s}
.card.is-open .variants,.card.is-pinned .variants{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);transition-delay:0s,0s,0s}
.card.is-pinned .variants{transition-delay:0s;border-color:#df7a12}
.variants-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.variants-title{min-width:0;color:#3f4652;font-size:13px;font-weight:800;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pin-variants{width:32px;height:32px;border:1px solid #ead4b5;border-radius:9px;background:#fff8ec;color:#9a5800;font-size:16px;line-height:1;cursor:pointer}
.pin-variants:hover,.pin-variants[aria-pressed="true"]{background:#df7a12;color:#fff;border-color:#df7a12}
.variants-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px}
.variant{display:grid;gap:7px;min-width:0;border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:8px;cursor:pointer;text-align:center;font:inherit;color:inherit}
.variant:hover,.variant:focus-visible{border-color:#e5b56e;background:#fff8ec;outline:0}
.variant img{width:100%;height:112px;object-fit:contain;border-radius:8px;background:transparent}
.variant span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#3f4652;font-size:13px;font-weight:800}
.variant small{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#7b838e;font-size:11px;font-weight:700}
.load-error{margin:28px auto;color:#9a5800;font-weight:800;text-align:center}
@container (max-width: 560px){.grid{gap:20px 18px;padding-left:24px;padding-right:24px}}
@container (max-width: 390px){.grid{gap:18px 14px;padding:14px 18px 22px}.card-main{grid-template-rows:96px auto}.card-main img{height:96px}.variants-grid{grid-template-columns:repeat(auto-fit,minmax(112px,1fr))}.variant img{height:104px}}
@container (max-width: 310px){.grid{gap:22px;padding:16px 28px 24px}.card-main{grid-template-rows:132px auto}.card-main img{height:132px}.card-main strong{font-size:15px}.variants{top:112px}}
</style>
</head>
<body>
<main class="wrap">
  <div class="head">
    <h1 id="title">Атлас изделий</h1>
    <p class="intro" id="intro">Выберите изделие: откроется расчёт, где можно задать размеры и подготовить позицию.</p>
    <div class="version">clean-panel-v1</div>
  </div>
  <section class="cats" id="cats"></section>
</main>
<script>
const params=new URLSearchParams(location.search);
function savedSettings(){try{return JSON.parse(localStorage.getItem("calcSquareSettingsCleanV1")||"{}")}catch(e){return {}}}
const settings=savedSettings();
let lang=params.get("lang")||settings.lang||"ru";
let role=params.get("role")||settings.role||"guest";
const active=params.get("cat")||params.get("category")||"";
const text={
  ru:{title:"Атлас изделий",intro:"Выберите изделие: откроется расчёт, где можно задать размеры и подготовить позицию.",pin:"Закрепить",unpin:"Открепить",variants:"Варианты"},
  uk:{title:"Атлас виробів",intro:"Виберіть виріб: відкриється розрахунок, де можна задати розміри та підготувати позицію.",pin:"Закріпити",unpin:"Відкріпити",variants:"Варіанти"},
  en:{title:"Product atlas",intro:"Choose a fitting to open its calculator, enter dimensions, and prepare a specification item.",pin:"Pin",unpin:"Unpin",variants:"Variants"}
};
if(!text[lang])lang="ru";
document.documentElement.lang=lang;
document.getElementById("title").textContent=(text[lang]||text.ru).title;
document.getElementById("intro").textContent=(text[lang]||text.ru).intro;
document.querySelector(".version").textContent=params.get("label")||params.get("v")||"dev";
document.title="Calc Square · "+(text[lang]||text.ru).title;
const cats=document.getElementById("cats");
const pinnedPreviewKey="calcSquareAtlasPinnedPreview";
function pick(value){return value?.[lang]||value?.ru||value?.en||""}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function updateAtlasColumns(){
  document.querySelectorAll(".grid").forEach(grid=>{
    const width=grid.clientWidth||grid.parentElement?.clientWidth||0;
    const usable=Math.max(0,width-64);
    const columns=clamp(Math.floor((usable+24)/138),1,8);
    grid.style.setProperty("--atlas-cols",columns);
  });
}
const resizeObserver=new ResizeObserver(updateAtlasColumns);
function parentTargetOrigin(){return location.protocol==="file:"||location.origin==="null"?"*":location.origin}
function openModule(key,extraParams={}){
  clearPendingHover();
  const next=new URL("../../modules/common/calculator.html",location.href);
  next.searchParams.set("module",key);
  next.searchParams.set("lang",lang);
  next.searchParams.set("role",role);
  Object.entries(extraParams||{}).forEach(([param,value])=>{
    if(value!==undefined&&value!==null&&value!=="")next.searchParams.set(param,value);
  });
  const url=next.href;
  if(window.parent&&window.parent!==window){
    window.parent.postMessage({type:"calcSquare:open",url},parentTargetOrigin());
  }else{
    location.href=url;
  }
}
function openCatalogItem(key,variant={}){
  const params=variant.params||{};
  const targetKey=params.module||key;
  const extraParams={...params};
  delete extraParams.module;
  openModule(targetKey,extraParams);
}
function renderVariants(item,title){
  if(!Array.isArray(item.variants)||!item.variants.length)return "";
  const variants=item.variants.map(variant=>`
    <button class="variant" type="button" data-variant='${JSON.stringify({params:variant.params||{}}).replaceAll("'","&#39;")}'>
      <img src="${variant.image}" alt="">
      <span>${pick(variant.title)}</span>
      ${variant.source?`<small>${variant.source}</small>`:""}
    </button>
  `).join("");
  const labels=text[lang]||text.ru;
  return `<div class="variants" aria-label="${labels.variants}">
    <div class="variants-head">
      <span class="variants-title">${title}</span>
      <button class="pin-variants" type="button" aria-pressed="false" title="${labels.pin}" aria-label="${labels.pin}">📎</button>
    </div>
    <div class="variants-grid">${variants}</div>
  </div>`;
}
const closeTimers=new WeakMap();
let hoverTimer=0,hoverCard=null;
function clearPendingHover(card=null){
  if(card&&hoverCard!==card)return;
  if(hoverTimer){
    clearTimeout(hoverTimer);
    hoverTimer=0;
  }
  hoverCard=null;
}
function scheduleVariantOpen(card){
  clearPendingHover();
  hoverCard=card;
  hoverTimer=setTimeout(()=>{
    if(hoverCard===card)openVariantMenu(card);
    clearPendingHover(card);
  },700);
}
function cancelVariantClose(card){
  const timer=closeTimers.get(card);
  if(timer){
    clearTimeout(timer);
    closeTimers.delete(card);
  }
}
function openVariantMenu(card){
  if(!card.querySelector(".variants"))return;
  clearPendingHover(card);
  cancelVariantClose(card);
  document.querySelectorAll(".card.is-open:not(.is-pinned)").forEach(openCard=>{
    if(openCard!==card){
      cancelVariantClose(openCard);
      openCard.classList.remove("is-open");
    }
  });
  card.classList.add("is-open");
  positionVariantMenu(card);
}
function scheduleVariantClose(card){
  if(card.classList.contains("is-pinned"))return;
  clearPendingHover(card);
  cancelVariantClose(card);
  closeTimers.set(card,setTimeout(()=>{
    card.classList.remove("is-open");
    closeTimers.delete(card);
  },1000));
}
function setVariantPinned(card,pinned){
  const pin=card.querySelector(".pin-variants");
  const labels=text[lang]||text.ru;
  cancelVariantClose(card);
  clearPendingHover(card);
  card.classList.toggle("is-pinned",pinned);
  card.classList.toggle("is-open",pinned);
  if(pinned)sessionStorage.setItem(pinnedPreviewKey,card.dataset.key||"");
  else if(sessionStorage.getItem(pinnedPreviewKey)===(card.dataset.key||""))sessionStorage.removeItem(pinnedPreviewKey);
  if(pinned)positionVariantMenu(card);
  if(pin){
    pin.setAttribute("aria-pressed",String(pinned));
    pin.title=pinned?labels.unpin:labels.pin;
    pin.setAttribute("aria-label",pin.title);
  }
}
function positionVariantMenu(card){
  const menu=card.querySelector(".variants");
  if(!menu)return;
  const gap=12;
  const cardRect=card.getBoundingClientRect();
  const viewportWidth=document.documentElement.clientWidth||window.innerWidth;
  const viewportHeight=document.documentElement.clientHeight||window.innerHeight;
  menu.style.maxHeight="";
  menu.style.overflowY="";
  const width=Math.min(420,Math.max(0,viewportWidth-gap*2));
  menu.style.width=width+"px";
  let left=cardRect.left+cardRect.width/2-width/2;
  left=Math.min(Math.max(gap,left),viewportWidth-gap-width);
  const height=menu.getBoundingClientRect().height;
  let top=cardRect.bottom+8;
  if(top+height>viewportHeight-gap)top=cardRect.top-height-8;
  if(top<gap){
    top=gap;
    menu.style.maxHeight=Math.max(160,viewportHeight-gap*2)+"px";
    menu.style.overflowY="auto";
  }
  menu.style.setProperty("--variants-left",left+"px");
  menu.style.setProperty("--variants-top",top+"px");
}
function positionOpenVariantMenus(){
  document.querySelectorAll(".card:hover,.card:focus-within,.card.is-open,.card.is-pinned").forEach(positionVariantMenu);
}
function restorePinnedPreview(){
  const key=sessionStorage.getItem(pinnedPreviewKey);
  if(!key)return;
  const card=document.querySelector(`.card[data-key="${CSS.escape(key)}"]`);
  if(!card){
    sessionStorage.removeItem(pinnedPreviewKey);
    return;
  }
  setVariantPinned(card,true);
}
function renderCatalog(){
  cats.innerHTML="";
  if(!Array.isArray(window.CALC_CATALOG)||!window.CALC_CATALOG.length){
    cats.innerHTML=`<p class="load-error">${lang==="en"?"Catalog did not load.":lang==="uk"?"Каталог не завантажився.":"Каталог не загрузился."}</p>`;
    return;
  }
  window.CALC_CATALOG.forEach(category=>{
  const details=document.createElement("details");
  details.open=!active||active===category.key;
  details.innerHTML=`<summary>${pick(category.title)}</summary><div class="grid"></div>`;
  const grid=details.querySelector(".grid");
  category.items.forEach(item=>{
    const card=document.createElement("article");
    const title=pick(item.title);
    card.className="card";
    card.dataset.key=item.key;
    card.innerHTML=`<button class="card-main" type="button"><img src="${item.image}" alt=""><strong>${title}</strong></button>${renderVariants(item,title)}`;
    card.addEventListener("pointerenter",()=>scheduleVariantOpen(card));
    card.addEventListener("pointerleave",()=>scheduleVariantClose(card));
    card.addEventListener("focusin",()=>openVariantMenu(card));
    const menu=card.querySelector(".variants");
    if(menu){
      menu.addEventListener("pointerenter",()=>openVariantMenu(card));
      menu.addEventListener("pointerleave",()=>scheduleVariantClose(card));
    }
    card.querySelector(".card-main").addEventListener("click",()=>openModule(item.key));
    card.querySelectorAll(".variant").forEach(button=>button.addEventListener("click",(event)=>{
      event.stopPropagation();
      let variant={};
      try{variant=JSON.parse(button.dataset.variant||"{}")}catch(e){variant={}}
      openCatalogItem(item.key,variant);
    }));
    const pin=card.querySelector(".pin-variants");
    if(pin)pin.addEventListener("click",(event)=>{
      event.stopPropagation();
      setVariantPinned(card,!card.classList.contains("is-pinned"));
    });
    grid.appendChild(card);
  });
  cats.appendChild(details);
  });
  document.querySelectorAll(".grid").forEach(grid=>resizeObserver.observe(grid));
  updateAtlasColumns();
  restorePinnedPreview();
}
function loadCatalog(){
  const script=document.createElement("script");
  const version=params.get("v")||"dev";
  script.src=`catalog-map.js?v=${encodeURIComponent(version)}`;
  script.onload=renderCatalog;
  script.onerror=renderCatalog;
  document.head.appendChild(script);
}
loadCatalog();
window.addEventListener("resize",()=>{updateAtlasColumns();positionOpenVariantMenus();});
window.addEventListener("scroll",positionOpenVariantMenus,{passive:true});
document.addEventListener("keydown",(event)=>{
  if(event.key==="Escape"){
    unpinCards();
  }
});
document.addEventListener("click",(event)=>{
  if(!event.target.closest(".card"))unpinCards();
});
function unpinCards(){
  clearPendingHover();
  document.querySelectorAll(".card.is-pinned").forEach(card=>{
    setVariantPinned(card,false);
  });
  document.querySelectorAll(".card.is-open").forEach(card=>{
    cancelVariantClose(card);
    card.classList.remove("is-open");
  });
}
</script>
</body>
</html>
