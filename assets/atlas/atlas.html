<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calc Square · Атлас</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#e9e9e9;color:#24272d;font-family:"Exo 2",Arial,sans-serif;font-style:italic;padding:18px 12px}
.wrap{width:100%;max-width:none;margin:0 auto}
.head{display:block;text-align:center;margin-bottom:18px}
h1{margin:0;color:#5b6573;font-size:30px;line-height:1;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.03em}
.version{display:none}
.cats{display:flex;flex-direction:column;gap:0}
details{background:transparent;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.5);margin-bottom:0}
details+details{margin-top:-1px}
summary{cursor:pointer;list-style:none;padding:24px 18px 6px;background:transparent;font-weight:800;color:#df7a12;text-align:center;font-size:18px}
summary::-webkit-details-marker{display:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:20px 24px;padding:16px 32px 26px;background:transparent}
.card{position:relative;display:grid;grid-template-rows:86px auto;gap:8px;border:0;border-radius:0;background:transparent;padding:0;text-align:center;cursor:pointer;color:inherit}
.card:hover strong{color:#df7a12}
.card img{width:100%;height:86px;object-fit:contain;filter:drop-shadow(0 2px 1px rgba(0,0,0,.08))}
.card strong{font-size:14px;line-height:1.15;font-weight:700;color:#3f4652}
.variants{position:absolute;z-index:20;left:50%;top:72px;display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:8px;width:min(260px,calc(100vw - 30px));padding:10px;border:1px solid rgba(214,205,183,.9);border-radius:10px;background:rgba(255,255,255,.96);box-shadow:0 14px 34px rgba(0,0,0,.16);opacity:0;pointer-events:none;transform:translate(-50%,8px);transition:opacity .14s ease,transform .14s ease}
.card:hover .variants,.card:focus-visible .variants{opacity:1;transform:translate(-50%,0)}
.variant{display:grid;gap:5px;min-width:0}
.variant img{height:58px;border-radius:6px;background:#f7f7f7}
.variant span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#5b6573;font-size:11px;font-weight:700}
@media(max-width:640px){body{padding:16px 10px}.wrap{max-width:none}h1{font-size:24px}.grid{grid-template-columns:1fr;padding:14px 18px 22px}.card{grid-template-rows:110px auto}.card img{height:110px}.variants{position:static;width:100%;opacity:1;pointer-events:none;transform:none;box-shadow:none;background:rgba(255,255,255,.5);grid-template-columns:repeat(auto-fit,minmax(82px,1fr))}}
</style>
</head>
<body>
<main class="wrap">
  <div class="head">
    <h1 id="title">Атлас изделий</h1>
    <div class="version">clean-panel-v1</div>
  </div>
  <section class="cats" id="cats"></section>
</main>
<script src="catalog-map.js"></script>
<script>
const params=new URLSearchParams(location.search);
function savedSettings(){try{return JSON.parse(localStorage.getItem("calcSquareSettingsCleanV1")||"{}")}catch(e){return {}}}
const settings=savedSettings();
let lang=params.get("lang")||settings.lang||"ru";
let role=params.get("role")||settings.role||"guest";
const active=params.get("cat")||params.get("category")||"";
const text={
  ru:{title:"Атлас изделий"},
  uk:{title:"Атлас виробів"},
  en:{title:"Product atlas"}
};
if(!text[lang])lang="ru";
document.documentElement.lang=lang;
document.getElementById("title").textContent=(text[lang]||text.ru).title;
document.title="Calc Square · "+(text[lang]||text.ru).title;
const cats=document.getElementById("cats");
function pick(value){return value?.[lang]||value?.ru||value?.en||""}
function openModule(key){
  const url="../../modules/common/calculator.html?module="+encodeURIComponent(key)+"&lang="+encodeURIComponent(lang)+"&role="+encodeURIComponent(role);
  if(window.parent&&window.parent!==window){
    window.parent.postMessage({type:"calcSquare:open",url:new URL(url,location.href).href},"*");
  }else{
    location.href=url;
  }
}
function renderVariants(item){
  if(!Array.isArray(item.variants)||!item.variants.length)return "";
  const variants=item.variants.map(variant=>`
    <span class="variant">
      <img src="${variant.image}" alt="">
      <span>${pick(variant.title)}</span>
    </span>
  `).join("");
  return `<span class="variants" aria-hidden="true">${variants}</span>`;
}
(window.CALC_CATALOG||[]).forEach(category=>{
  const details=document.createElement("details");
  details.open=!active||active===category.key;
  details.innerHTML=`<summary>${pick(category.title)}</summary><div class="grid"></div>`;
  const grid=details.querySelector(".grid");
  category.items.forEach(item=>{
    const button=document.createElement("button");
    button.className="card";
    button.type="button";
    button.innerHTML=`<img src="${item.image}" alt=""><strong>${pick(item.title)}</strong>${renderVariants(item)}`;
    button.addEventListener("click",()=>openModule(item.key));
    grid.appendChild(button);
  });
  cats.appendChild(details);
});
</script>
</body>
</html>
