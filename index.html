<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Calc Square</title>

<style>

body{
margin:0;
background:#f2f2f2;
font-family:Arial;
}

.wrap{
max-width:1100px;
margin:auto;
padding:50px;
}

.logo{
text-align:center;
margin-bottom:50px;
}

.logo img{
width:700px;
max-width:100%;
}

.subtitle{
font-size:28px;
font-weight:bold;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

text-decoration:none;
color:black;

transition:.2s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
margin:0 0 20px;
}

.status{
color:#666;
}

</style>

</head>

<body>

<div class="wrap">

<div class="logo">

<img src="calc_square_logo.png">

<div class="subtitle">
Calc Square
</div>

</div>

<div class="grid">

<a
class="card"
href="./modules/rectangular/"
>

<h2>
Прямоугольные воздуховоды
</h2>

<div class="status">
Версия 1.0
</div>

</a>

</div>

</div>

</body>
</html>
